name: scorecard

on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 1 * * 6"
  branch_protection_rule:
  workflow_dispatch:

permissions: read-all

jobs:
  run-scorecard:
    uses: cisco-ospo/.github/.github/workflows/_scorecard.yml@main
    permissions:
      id-token: write
      security-events: write
    secrets: inherit
    with:
      publish-results: true
